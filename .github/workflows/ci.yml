name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  security-hardening-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      CI_NO_SANDBOX: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Canonical security-hardening gate
        run: xvfb-run -a npm run ci:test

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (blocking high severity)
        run: npm audit --audit-level=high
